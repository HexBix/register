name: Automatic Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  auto-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Run auto-review script
        id: check
        run: node scripts/auto_review.js
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: Approve and Merge Pull Request
        if: steps.check.outputs.approve == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Auto-approved: Changes verified."
          gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch
