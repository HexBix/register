name: Update lists.txt from PR

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  update-lists:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Update lists.txt (pending)
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          node scripts/update_lists_pr.js

      - name: Commit changes (if any)
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add lists.txt
            git commit -m "chore: update lists.txt (pending) for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "No changes to commit."
          fi

